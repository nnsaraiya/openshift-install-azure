---
# NOTE: openshift-install consumes install-config.yaml when it generates manifests, so this
# task must run after install_config.yml has rendered a fresh copy into install_dir.
# This creates real, billed Azure infrastructure and takes ~40 minutes.
- name: Run openshift-install create cluster
  ansible.builtin.command: "{{ bin_dir }}/openshift-install create cluster --dir {{ install_dir }} --log-level info"
  register: _create_cluster
  changed_when: true

- name: Show installer output
  ansible.builtin.debug:
    var: _create_cluster.stdout_lines
