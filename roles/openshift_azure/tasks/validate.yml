---
# openshift-install create manifests exercises Azure auth, the base-domain DNS zone lookup,
# and quota/region checks without creating any billed cloud resources.
- name: Run openshift-install create manifests as a non-destructive validation
  ansible.builtin.command: "{{ bin_dir }}/openshift-install create manifests --dir {{ install_dir }} --log-level info"
  register: _validate
  changed_when: true

- name: Show validation output
  ansible.builtin.debug:
    var: _validate.stderr_lines

- name: Reset install workspace back to a clean pre-render state
  ansible.builtin.shell: "find {{ install_dir }} -mindepth 1 ! -name '.gitkeep' -delete"
  args:
    executable: /bin/bash
  changed_when: true
